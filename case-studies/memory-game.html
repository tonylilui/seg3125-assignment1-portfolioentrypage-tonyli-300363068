<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memory Game - Tony Li</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      }
      .redirect-container {
        text-align: center;
        color: white;
      }
      .redirect-container h1 {
        font-size: 2.5rem;
        margin-bottom: 1rem;
      }
      .redirect-container p {
        font-size: 1.25rem;
        opacity: 0.9;
        margin-bottom: 2rem;
      }
      .play-btn {
        display: inline-block;
        background: white;
        color: #667eea;
        padding: 1rem 3rem;
        border-radius: 12px;
        font-size: 1.25rem;
        font-weight: 700;
        text-decoration: none;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }
      .play-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        color: #764ba2;
      }
    </style>
  </head>
  <body>
    <div class="redirect-container">
      <h1>🧠 Memory Game</h1>
      <p>Un jeu de mémoire — Test your memory!</p>
      <a href="../index.html#/memory" class="play-btn">▶ Play Now</a>
      <p class="mt-4">
        <a href="../index.html" style="color: white; opacity: 0.8"
          >← Back to Portfolio</a
        >
      </p>
    </div>
  </body>
</html>
